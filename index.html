  <body>
    <div id="impersonation-preloader" style="display:none;position:fixed;inset:0;z-index:99999;background:#0f172aF2;backdrop-filter:blur(12px);align-items:center;justify-content:center;flex-direction:column;font-family:system-ui,-apple-system,sans-serif;">
      <style>
        @keyframes imp-spin{to{transform:rotate(360deg)}}
        @keyframes imp-ping{75%,100%{transform:scale(2);opacity:0}}
        @keyframes imp-pulse{50%{opacity:.5}}
        @keyframes imp-progress{0%{width:0}25%{width:30%}50%{width:55%}75%{width:78%}100%{width:95%}}
        .imp-spin{animation:imp-spin 1s linear infinite}
        .imp-ping{animation:imp-ping 1s cubic-bezier(0,0,.2,1) infinite}
        .imp-pulse{animation:imp-pulse 2s cubic-bezier(.4,0,.6,1) infinite}
        .imp-progress{animation:imp-progress 4s ease-out forwards}
      </style>
      <div style="position:relative;width:96px;height:96px;margin-bottom:32px;">
        <div style="width:96px;height:96px;border-radius:50%;background:linear-gradient(135deg,#f59e0b,#ea580c);display:flex;align-items:center;justify-content:center;box-shadow:0 25px 50px -12px rgba(245,158,11,0.3);">
          <span id="imp-initials" style="font-size:30px;font-weight:700;color:#fff;"></span>
        </div>
        <div class="imp-ping" style="position:absolute;inset:0;border-radius:50%;background:rgba(245,158,11,0.3);"></div>
        <div style="position:absolute;bottom:-4px;right:-4px;width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#fbbf24,#ea580c);display:flex;align-items:center;justify-content:center;box-shadow:0 0 0 4px #0f172a;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </div>
      </div>
      <h2 id="imp-title" style="font-size:24px;font-weight:700;color:#fff;margin:0 0 8px 0;text-align:center;padding:0 16px;"></h2>
      <p id="imp-subtitle" style="font-size:16px;color:#94a3b8;margin:0 0 40px 0;text-align:center;padding:0 16px;"></p>
      <div style="max-width:500px;width:100%;padding:0 24px;box-sizing:border-box;">
        <div style="height:12px;background:rgba(51,65,85,0.5);border-radius:9999px;overflow:hidden;">
          <div class="imp-progress" style="height:100%;background:linear-gradient(90deg,#f59e0b,#ea580c,#22c55e);border-radius:9999px;width:0;">
            <div class="imp-pulse" style="width:100%;height:100%;background:rgba(255,255,255,0.2);border-radius:9999px;"></div>
          </div>
        </div>
        <div style="display:flex;justify-content:space-between;margin-top:12px;">
          <span style="font-size:14px;color:#64748b;">Loading member view...</span>
          <span style="font-size:14px;color:#64748b;display:flex;align-items:center;gap:6px;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fbbf24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            Admin View Mode
          </span>
        </div>
      </div>
    </div>
    <script>
      (function(){
        try{
          var flag=sessionStorage.getItem('impersonation_preloader_active');
          if(flag!=='true')return;
          var el=document.getElementById('impersonation-preloader');
          if(!el)return;
          el.style.display='flex';
          var s=sessionStorage.getItem('impersonation_session');
          if(s){
            var d=JSON.parse(s);
            var name=d.targetName||'';
            var parts=name.split(' ');
            var initials=(parts[0]?parts[0][0]:'')+(parts[1]?parts[1][0]:'');
            document.getElementById('imp-initials').textContent=initials.toUpperCase();
            document.getElementById('imp-title').textContent='Switching to '+name;
            var club=d.targetClubs&&d.targetClubs.length?d.targetClubs[0]:null;
            if(d.targetDefaultClubId&&d.targetClubs){
              for(var i=0;i<d.targetClubs.length;i++){
                if(d.targetClubs[i].club_id===d.targetDefaultClubId){club=d.targetClubs[i];break;}
              }
            }
            document.getElementById('imp-subtitle').textContent=club?'Loading '+name+"'s dashboard at "+club.club_name:'Loading '+name+"'s member experience";
          }
        }catch(e){}
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
